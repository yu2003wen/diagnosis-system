<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#fff;border-radius:12px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.login-card h1{font-size:22px;color:#1F4E79;text-align:center;margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px}
.login-card input:focus{outline:none;border-color:#1F4E79}
.login-card button{width:100%;padding:12px;background:#1F4E79;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-card button:hover{background:#2a6ba8}
.login-error{color:#e53935;font-size:13px;text-align:center;margin-top:12px;display:none}
.app-layout{display:none}
.header{background:#1F4E79;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px}
.btn-logout{padding:6px 14px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;cursor:pointer;font-size:12px}
.content{padding:20px 24px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
th{background:#f8f9fb;padding:12px 8px;text-align:left;border-bottom:1px solid #eee;font-weight:600;color:#555}
td{padding:10px 8px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#f8faff}
.b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-n{background:#fff3e0;color:#e65100}
.b-r{background:#e3f2fd;color:#1565c0}
.b-p{background:#f3e5f5;color:#7b1fa2}
.b-d{background:#e8f5e9;color:#2e7d32}
.sbtn{padding:4px 10px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:12px}
.sbtn:hover{background:#f5f5f5}
.sbtn-p{background:#1F4E79;color:#fff;border-color:#1F4E79}
.sbtn-p:hover{background:#2a6ba8}
.sbtn-d{background:#c62828;color:#fff;border-color:#c62828}
.sbtn-d:hover{background:#e53935}
.sbtn-g{background:#1F7A4D;color:#fff;border-color:#1F7A4D}
.sbtn-g:hover{background:#2a9d62}
.empty{text-align:center;padding:60px 20px;color:#999}
.loading{text-align:center;padding:60px;color:#888}
.stat{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sc{background:#fff;border-radius:8px;padding:12px 20px;text-align:center;flex:1;min-width:80px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sc .n{font-size:24px;font-weight:700;color:#1F4E79}
.sc .l{font-size:12px;color:#888}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px}
.toolbar select{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px}
.sel-info{font-size:12px;color:#888;margin-left:4px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;padding:40px 20px;overflow-y:auto}
.modal.show{display:block}
.mc{background:#fff;border-radius:12px;max-width:600px;margin:0 auto;padding:24px;position:relative}
.mc h2{font-size:18px;color:#1F4E79;margin-bottom:16px}
.mc-close{position:absolute;top:12px;right:16px;font-size:28px;cursor:pointer;color:#999;background:none;border:none;line-height:1}
.grid{display:grid;grid-template-columns:100px 1fr;gap:4px 12px;font-size:13px;margin-bottom:16px}
.grid .k{color:#888}
input[type=checkbox]{accent-color:#1F4E79;cursor:pointer}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-card">
    <h1>管理后台</h1>
    <form id="loginForm">
      <input type="password" id="pw" placeholder="管理员密码" required>
      <button type="submit">进入后台</button>
      <div class="login-error" id="loginErr">密码错误</div>
    </form>
  </div>
</div>

<div class="app-layout" id="app">
  <div class="header">
    <h1>客户自诊数据</h1>
    <button class="btn-logout" id="logoutBtn">退出</button>
  </div>
  <div class="content">
    <div class="stat" id="statBar"></div>
    <div class="toolbar">
      <select id="filter">
        <option value="all">全部</option><option value="new">待处理</option>
        <option value="read">已读</option><option value="processing">处理中</option>
        <option value="completed">已完成</option>
      </select>
      <button class="sbtn" id="refreshBtn">刷新</button>
      <button class="sbtn sbtn-g" id="exportBtn">📥 导出选中</button>
      <span class="sel-info" id="selInfo">未选择</span>
      <button class="sbtn sbtn-d" id="delSelectedBtn" style="margin-left:auto">🗑 删除选中</button>
    </div>
    <div class="loading" id="loading">加载中...</div>
    <div class="empty" id="empty" style="display:none"><h3>暂无数据</h3></div>
    <table id="table" style="display:none">
      <thead><tr>
        <th style="width:30px"><input type="checkbox" id="selectAll"></th>
        <th>时间</th><th>店铺</th><th>客户</th><th>手机</th><th>状态</th><th>操作</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="mc">
    <button class="mc-close" id="modalClose">&times;</button>
    <h2 id="modalTitle">详情</h2>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ===== 配置 =====
var SU = 'https://quncytlifkaqcgpmjmeh.supabase.co';
var AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1bmN5dGxpZmthcWNncG1qbWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjgxMTYsImV4cCI6MjA5NDk0NDExNn0.xhGD9zWq5JwQA_KNhW9bbvo3Mg5cLlCHWTKLbInjZsc';
var PW = 'admin888';
var all = [];
var headers = {'apikey': AK, 'Authorization': 'Bearer ' + AK};
var selIds = {}; // {id: true}

// ===== 登录 =====
document.getElementById('loginForm').onsubmit = function(e) {
  e.preventDefault();
  document.getElementById('loginErr').style.display = 'none';
  if (document.getElementById('pw').value === PW) {
    sessionStorage.setItem('ok','1');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    load();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
};

document.getElementById('logoutBtn').onclick = function() {
  sessionStorage.removeItem('ok');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
};

if (sessionStorage.getItem('ok') === '1') {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  load();
}

document.getElementById('filter').onchange = function() { selIds = {}; render(); };
document.getElementById('refreshBtn').onclick = load;
document.getElementById('modalClose').onclick = function() { document.getElementById('modal').classList.remove('show'); };
document.getElementById('modal').onclick = function(e) { if (e.target === this) this.classList.remove('show'); };

// ===== 全选 =====
document.getElementById('selectAll').onchange = function() {
  var checked = this.checked;
  var list = getFilteredList();
  selIds = {};
  if (checked) { list.forEach(function(d) { selIds[d.id] = true; }); }
  updateSelInfo();
  render();
};

function getFilteredList() {
  var f = document.getElementById('filter').value;
  return f === 'all' ? all : all.filter(function(d) { return d.status === f; });
}

function updateSelInfo() {
  var cnt = Object.keys(selIds).length;
  document.getElementById('selInfo').textContent = cnt > 0 ? '已选 ' + cnt + ' 条' : '未选择';
}

// ===== 导出完整数据 =====
document.getElementById('exportBtn').onclick = function() {
  var list = getFilteredList();
  if (Object.keys(selIds).length > 0) {
    list = list.filter(function(d) { return selIds[d.id]; });
  }
  if (list.length === 0) { alert('没有可导出的数据，请先勾选'); return; }

  // 基础字段
  var keys = ['store_name','owner_name','phone','category','form_version','created_at','status'];
  var labels = ['店铺名称','老板姓名','手机号','品类','表单版本','提交时间','状态'];

  // form_data 字段
  var fdKeys = ['shopName','contact','location','industry_type','industry_subtype','monthly_revenue','rent','employees','stage','trend_30d'];
  var fdLabels = ['店铺名(新)','联系方式','所在区域','行业大类','细分类型','月营业额','月租金','员工','经营阶段','近30天趋势'];
  var coreLabels = ['主要客源渠道','门店识别度','产品结构','成交障碍','盈亏平衡点','老板实际利润','渠道统计','推广动作','客户沉淀','复购机制','每日数据记录','老板依赖度'];
  var needLabels = ['优先解决问题','后续需求','期望利润提升'];
  keys = keys.concat(fdKeys).concat(coreLabels).concat(needLabels);
  labels = labels.concat(fdLabels).concat(coreLabels).concat(needLabels);

  // 找出所有行业专属题（合并所有记录中的字段）
  var extraHeaders = {};
  list.forEach(function(d) {
    if (d.form_data && d.form_data.special_answers) {
      for (var k in d.form_data.special_answers) { extraHeaders[k] = true; }
    }
  });
  var extraKeys = Object.keys(extraHeaders);
  if (extraKeys.length) { keys = keys.concat(extraKeys); labels = labels.concat(extraKeys); }

  // 取值的辅助函数
  function getVal(d, k) {
    if (d.form_data) {
      if (d.form_data[k] !== undefined) return d.form_data[k];
      if (d.form_data.core_answers && d.form_data.core_answers[k] !== undefined) return d.form_data.core_answers[k];
      if (d.form_data.special_answers && d.form_data.special_answers[k] !== undefined) return d.form_data.special_answers[k];
    }
    return d[k];
  }

  var rows = list.map(function(d) {
    return keys.map(function(k) {
      var v = getVal(d, k);
      v = (v === undefined || v === null) ? '' : (Array.isArray(v) ? v.join('、') : v);
      return '"' + String(v).replace(/"/g,'""') + '"';
    }).join(',');
  });

  var csv = labels.map(function(l) { return '"' + l + '"'; }).join(',') + '\n' + rows.join('\n');
  var blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var now = new Date();
  a.download = '诊断数据_全部_' + now.getFullYear() + '-' + (now.getMonth()+1) + '-' + now.getDate() + '.csv';
  a.click();
};

// ===== 批量删除 =====
document.getElementById('delSelectedBtn').onclick = function() {
  var ids = Object.keys(selIds);
  if (ids.length === 0) { alert('请先勾选要删除的数据'); return; }
  if (!confirm('确认删除选中的 ' + ids.length + ' 条数据？删除后不可恢复！')) return;
  delRecords(ids);
};

async function delRecords(ids) {
  var ok = 0, fail = 0;
  for (var i = 0; i < ids.length; i++) {
    try {
      var r = await fetch(SU + '/rest/v1/submissions?id=eq.' + ids[i], {method:'DELETE', headers:headers});
      if (!r.ok) throw new Error('HTTP '+r.status);
      ok++;
    } catch(e) { fail++; }
  }
  alert('删除完成：成功 '+ok+' 条' + (fail?'，失败 '+fail:''));
  selIds = {};
  load();
}

// ===== 单个删除 =====
async function delOne(id, name) {
  if (!confirm('确认删除「'+name+'」的数据？不可恢复！')) return;
  try {
    var r = await fetch(SU + '/rest/v1/submissions?id=eq.' + id, {method:'DELETE', headers:headers});
    if (!r.ok) throw new Error('HTTP '+r.status);
    delete selIds[id];
    load();
  } catch(e) { alert('删除失败'); }
}

// ===== 加载数据 =====
async function load() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  try {
    var r = await fetch(SU + '/rest/v1/submissions?select=*&order=created_at.desc', {headers: headers});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    all = await r.json() || [];
    selIds = {};
    render();
  } catch(e) {
    document.getElementById('loading').textContent = '⚠️ 加载失败：' + e.message;
  }
  document.getElementById('loading').style.display = 'none';
}

// ===== 渲染 =====
function render() {
  var f = document.getElementById('filter').value;
  var list = f === 'all' ? all : all.filter(function(d) { return d.status === f; });
  var n = all.filter(function(d) { return !d.status || d.status === 'new'; }).length;
  var p = all.filter(function(d) { return d.status === 'processing'; }).length;
  var c = all.filter(function(d) { return d.status === 'completed'; }).length;
  document.getElementById('statBar').innerHTML =
    '<div class="sc"><div class="n">'+all.length+'</div><div class="l">全部</div></div>' +
    '<div class="sc"><div class="n" style="color:#e65100">'+n+'</div><div class="l">待处理</div></div>' +
    '<div class="sc"><div class="n" style="color:#7b1fa2">'+p+'</div><div class="l">处理中</div></div>' +
    '<div class="sc"><div class="n" style="color:#2e7d32">'+c+'</div><div class="l">已完成</div></div>';
  updateSelInfo();
  if (list.length === 0) {
    document.getElementById('table').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('table').style.display = 'table';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('selectAll').checked = false;
  var html = '';
  list.forEach(function(d) {
    var sc = (!d.status||d.status==='new')?'b-n':d.status==='read'?'b-r':d.status==='processing'?'b-p':'b-d';
    var sl = (!d.status||d.status==='new')?'待处理':d.status==='read'?'已读':d.status==='processing'?'处理中':'已完成';
    var t = d.created_at ? new Date(d.created_at).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
    var chk = selIds[d.id] ? 'checked' : '';
    html += '<tr><td><input type="checkbox" class="row-chk" data-id="'+d.id+'" '+chk+'></td>' +
      '<td style="white-space:nowrap">'+esc(t)+'</td><td><b>'+esc(d.store_name)+'</b></td>' +
      '<td>'+esc(d.owner_name)+'</td><td>'+esc(d.phone)+'</td>' +
      '<td><span class="b '+sc+'">'+sl+'</span></td>' +
      '<td><button class="sbtn sbtn-p" onclick="view(\''+d.id+'\')">详情</button> <button class="sbtn sbtn-d" onclick="delOne(\''+d.id+'\',\''+esc(d.store_name||'未命名')+'\')">删除</button></td></tr>';
  });
  document.getElementById('tbody').innerHTML = html;

  // 行复选框事件
  document.querySelectorAll('.row-chk').forEach(function(cb) {
    cb.onchange = function() {
      if (this.checked) { selIds[this.dataset.id] = true; } else { delete selIds[this.dataset.id]; }
      updateSelInfo();
    };
  });
}

function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== 查看详情 =====
async function view(id) {
  var d = all.find(function(x) { return x.id === id; });
  if (!d) return;
  if (!d.status || d.status === 'new') {
    try {
      await fetch(SU + '/rest/v1/submissions?id=eq.' + id, {
        method: 'PATCH', headers: Object.assign({'Content-Type':'application/json'}, headers),
        body: JSON.stringify({status:'read'})
      });
      d.status = 'read';
      render();
    } catch(e) {}
  }
  document.getElementById('modalTitle').textContent = (d.store_name || '未命名') + ' · 详细数据';
  var html = '<div class="grid">';

  if (d.form_version === 'v2' && d.form_data) {
    var fd = d.form_data;
    function add(k, v) {
      if (v === undefined || v === null || v === '' || v === '未填写') return;
      var val = Array.isArray(v) ? v.join('、') : String(v);
      html += '<span class="k">'+esc(k)+'</span><span>'+esc(val)+'</span>';
    }
    add('店铺名称', fd.shopName || d.store_name);
    add('联系方式', fd.contact);
    add('所在区域', fd.location);
    add('行业', (fd.industry_type||'') + (fd.industry_subtype ? ' / '+fd.industry_subtype : ''));
    add('月营业额', fd.monthly_revenue);
    add('月租金', fd.rent);
    add('员工人数', fd.employees);
    add('经营阶段', fd.stage);
    add('近30天趋势', fd.trend_30d);

    var CORE_LIST = ['主要客源渠道','门店识别度','产品结构','成交障碍','盈亏平衡点','老板实际利润','渠道统计','推广动作','客户沉淀','复购机制','每日数据记录','老板依赖度'];
    CORE_LIST.forEach(function(label) {
      var v = fd.core_answers ? fd.core_answers[label] : null;
      add(label, v);
    });

    if (fd.special_answers) {
      for (var k in fd.special_answers) { add(k, fd.special_answers[k]); }
    }
    add('优先解决问题', fd.priorities);
    add('后续需求', fd.followup_need);
    add('期望利润提升', fd.profit_expectation);
    if (fd.tags) {
      var tagArr = [];
      if (fd.tags.risk && fd.tags.risk.length) { fd.tags.risk.forEach(function(t) { tagArr.push('⚠️'+t); }); }
      if (fd.tags.good && fd.tags.good.length) { fd.tags.good.forEach(function(t) { tagArr.push('✅'+t); }); }
      add('标签', tagArr.join('、'));
    }
  } else {
    var fields = [
      ['店铺',d.store_name],['老板',d.owner_name],['手机',d.phone],
      ['品类',d.category],['开业',d.open_time],['员工',d.employees],
      ['月营业额',d.monthly_revenue],['月租',d.rent],['位置',d.location],
      ['客流',d.q1_flow_people],['客流原因',d.q2_flow_reason],['客流统计',d.q3_flow_tracking],
      ['成交率',d.q4_conversion_rate],['流失原因',d.q5_loss_reason],['停留时长',d.q6_stay_time],
      ['利润核算',d.q7_profit_clarity],['成本了解',d.q8_cost_awareness],['毛利率',d.q9_product_margin],
      ['推广预算',d.q10_marketing_budget],['效果判断',d.q11_marketing_effect],['渠道',d.q12_marketing_channels],
      ['回头率',d.q13_return_rate],['维护方式',d.q14_retention_method],['流失',d.q15_churn_reason],
      ['在店时长',d.q16_owner_hours],['离店运转',d.q17_operation_without_owner],['SOP',d.q18_sop_status],
      ['最大问题',d.main_problem],['期望增收',d.expected_gain],['自诊',d.self_diagnosis],['备注',d.notes]
    ];
    fields.forEach(function(f) { if (f[1]) { html += '<span class="k">'+f[0]+'</span><span>'+esc(f[1])+'</span>'; } });
  }

  html += '</div>';
  html += '<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">';
  html += '<span style="font-size:13px;font-weight:500;line-height:28px">状态：</span>' +
    '<select onchange="upd(\''+d.id+'\',this.value)" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px">' +
    '<option value="new"'+(d.status==='new'||!d.status?' selected':'')+'>待处理</option>' +
    '<option value="read"'+(d.status==='read'?' selected':'')+'>已读</option>' +
    '<option value="processing"'+(d.status==='processing'?' selected':'')+'>处理中</option>' +
    '<option value="completed"'+(d.status==='completed'?' selected':'')+'>已完成</option>' +
    '</select>';
  if (d.form_version === 'v2' && d.form_data) {
    html += '<button class="sbtn sbtn-p" onclick="generateReport(\''+d.id+'\')" style="background:#E65100;border-color:#E65100">📄 生成诊断报告</button>';
  }
  html += '<button class="sbtn sbtn-d" onclick="if(confirm(\'确认删除？\')){delOne(\''+d.id+'\',\''+esc(d.store_name||'')+'\')}" style="margin-left:auto">🗑 删除</button>';
  html += '</div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

async function upd(id, status) {
  try {
    await fetch(SU + '/rest/v1/submissions?id=eq.' + id, {
      method: 'PATCH',
      headers: Object.assign({'Content-Type':'application/json'}, headers),
      body: JSON.stringify({status: status})
    });
    var d = all.find(function(x) { return x.id === id; });
    if (d) d.status = status;
    render();
  } catch(e) { alert('更新失败'); }
}

// ===== 生成诊断报告 =====
function generateReport(id) {
  var d = all.find(function(x) { return x.id === id; });
  if (!d || !d.form_data) return;
  var fd = d.form_data;
  var fd2 = fd.core_answers || {};
  var sp = fd.special_answers || {};
  var now = new Date();

  function va(k) { var v = fd2[k]; return (v === undefined || v === null) ? '' : (Array.isArray(v) ? v.join('、') : v); }
  function vp(k) { var v = fd[k]; return (v === undefined || v === null) ? '' : v; }
  function has(k) { var v = va(k); return v !== '' && v !== '未填写'; }

  // ===== 分析引擎 =====
  // 风险评分：每个维度0-10（越高越严重）
  function calcScore() {
    var scores = {};
    // 客流风险：主要客源渠道是否单一 + 门店识别度
    var src = va('主要客源渠道');
    var srcArr = src ? src.split('、') : [];
    scores.客流 = (srcArr.length <= 2 ? 7 : srcArr.length <= 3 ? 4 : 2) + (va('门店识别度').includes('不够明显') ? 3 : va('门店识别度').includes('看不懂') ? 5 : 0);

    // 成交风险
    scores.成交 = (has('成交障碍') ? Math.min(va('成交障碍').split('、').length * 2, 8) : 3) + (va('产品结构').includes('不清楚') ? 4 : va('产品结构').includes('大概') ? 2 : 0);

    // 利润风险
    scores.利润 = (va('盈亏平衡点').includes('不清楚') || va('盈亏平衡点').includes('没算过') ? 5 : va('盈亏平衡点').includes('大概') ? 3 : 1) * 1.5;
    if (va('老板实际利润').includes('亏损')) scores.利润 += 4;
    else if (va('老板实际利润').includes('打平')) scores.利润 += 2;

    // 推广风险
    scores.推广 = (va('渠道统计').includes('完全不知道') ? 5 : va('渠道统计').includes('凭感觉') ? 4 : va('渠道统计').includes('大概') ? 2 : 0) + (va('推广动作').includes('基本没做') ? 4 : 0);

    // 复购风险
    scores.复购 = (va('客户沉淀').includes('没有沉淀') || va('客户沉淀').includes('50人以下') ? 5 : va('客户沉淀').includes('说不清') ? 4 : va('客户沉淀').includes('50-200') ? 2 : 0) + (va('复购机制').includes('没有固定动作') ? 4 : 0);

    // 管理风险
    scores.管理 = (va('老板依赖度').includes('完全靠老板') ? 5 : va('老板依赖度').includes('不行') ? 4 : va('老板依赖度').includes('勉强') ? 2 : 0) + (va('每日数据记录').includes('没有记录') ? 4 : 0);

    // 归一化到0-10
    for (var k in scores) { scores[k] = Math.min(Math.round(scores[k]), 10); }
    return scores;
  }

  var scores = calcScore();
  var maxDim = ''; var maxScore = 0;
  for (var k in scores) { if (scores[k] > maxScore) { maxScore = scores[k]; maxDim = k; } }
  var sortedDims = Object.keys(scores).sort(function(a,b) { return scores[b] - scores[a]; });

  // ===== 各维度分析文本 =====
  function dimAnalysis(dim) {
    var texts = {
      '客流': {
        analysis: '客源结构'+(srcArr && srcArr.length <= 2 ? '较为单一，主要依赖少数渠道，抗风险能力较弱' : '相对多元，有一定抗风险能力')+'。门店识别度方面，'+(va('门店识别度')||'暂无数据')+'。',
        suggest: ['建议统计7天门前客流数据，摸清真实进店基数','优化门头设计，确保30米外能看清主营业务','拓展2-3个新获客渠道，降低单一渠道依赖']
      },
      '成交': {
        analysis: (has('成交障碍') ? '存在「'+va('成交障碍')+'」等成交障碍。' : '成交转化方面有待提升。')+(va('产品结构').includes('不清楚') ? '产品结构不够清晰，缺乏引流款和利润款的系统设计。' : va('产品结构').includes('大概') ? '产品结构有初步概念，但可以进一步系统化。' : '产品结构设计较为清晰。'),
        suggest: ['梳理产品矩阵：明确引流款、利润款、复购款','培训员工推荐话术，提升连带销售能力','记录客户不进店/不成交的原因，针对性优化']
      },
      '利润': {
        analysis: (va('盈亏平衡点').includes('不清楚')||va('盈亏平衡点').includes('没算过')?'没有计算过盈亏平衡点，这是经营中最基础也最重要的数据。':'对盈亏平衡点有一定认知。')+(va('老板实际利润').includes('亏损')?'当前处于亏损状态，需要紧急调整。':va('老板实际利润').includes('打平')?'当前仅能保本，没有利润积累。':'有一定利润空间。'),
        suggest: ['立刻计算盈亏平衡点，明确每月保本营业额','梳理各项成本占比，找出可优化的空间','盘点各产品/服务的毛利率，聚焦高利润产品']
      },
      '推广': {
        analysis: (va('渠道统计').includes('完全不知道')?'推广效果没有追踪，投入产出比完全不清晰。':va('渠道统计').includes('凭感觉')?'推广效果主要凭感觉判断，缺乏数据支撑。':'有初步的渠道效果追踪。')+(va('推广动作').includes('基本没做')?'目前几乎没有主动推广动作。':''),
        suggest: ['建立推广效果台账，记录每个渠道的投入和产出','先聚焦1-2个效果最好的渠道打透','在小红书/抖音/美团中选择适合的平台深耕']
      },
      '复购': {
        analysis: (va('客户沉淀').includes('没有沉淀')?'客户资产积累不足，没有可反复触达的客户池。':va('客户沉淀').includes('50人以下')?'客户池较小，需要加大新客获取和老客沉淀。':'有一定客户基础。')+(va('复购机制').includes('没有固定动作')?'缺乏系统化的复购机制设计。':'有初步的复购机制。'),
        suggest: ['建立客户微信池，对老客户进行分类管理','设计会员/储值/次卡等复购工具','建立老带新激励体系，让老客户帮你介绍']
      },
      '管理': {
        analysis: (va('老板依赖度').includes('完全靠老板')?'门店高度依赖老板个人，离开一天就可能出问题。':va('老板依赖度').includes('不行')?'老板缺位时门店运营会明显下滑。':'有一定管理基础。')+(va('每日数据记录').includes('没有记录')?'没有日常经营数据的记录习惯，决策缺乏依据。':''),
        suggest: ['建立每日经营数据记录习惯（营业额、客单、单数等）','梳理各岗位操作流程，形成简单的SOP','培养骨干员工，逐步降低对老板个人的依赖']
      }
    };
    return texts[dim] || {analysis:'需结合更多数据进一步分析。', suggest:['建议到店实地诊断，获取更全面的经营数据']};
  }

  // ===== 行业专有分析 =====
  function industryNote() {
    var notes = [];
    for (var k in sp) {
      var v = sp[k];
      if (k === '堂食/外卖结构') { if (v.includes('外卖')) notes.push('外卖占比较高，需重点关注平台扣点和外卖包装成本'); }
      if (k === '食材损耗') { if (v.includes('偏大')||v.includes('没统计')) notes.push('食材损耗需要统计和控制，直接影响利润率'); }
      if (k === '试穿率' || k === '试听转化') { if (v.includes('不到')) notes.push('进店转化率偏低，需优化接待流程和话术'); }
      if (k === '库存周转') { if (v.includes('压力')||v.includes('滞销')) notes.push('库存压力较大，建议做一次全面盘点并规划促销清仓'); }
      if (k === '新客转化') { if (v.includes('不到')) notes.push('新客转化率偏低，需优化体验价后的追销流程'); }
      if (k === '续费率') { if (v.includes('不到')) notes.push('续费率偏低，需关注客户满意度和服务价值感'); }
    }
    return notes.length ? notes : ['行业数据已记录，需结合行业经验进一步分析'];
  }

  var indNotes = industryNote();

  // ===== 政策红利 =====
  function policyTips() {
    var loc = fd.location || '';
    var tips = [];
    if (loc.includes('江西') || loc.includes('南昌')) {
      tips.push('江西省：餐饮贷款贴息（最高100万，年贴息1%）、餐饮+文旅联动消费券');
      tips.push('南昌市：提振消费行动方案电子消费券、夜间经济街区扶持、商贸业高质量发展政策（至2027年底）');
    }
    tips.push('国家层面：小规模纳税人月销售额10万以下免征增值税（至2027年底）、个体工商户个税减半（年应纳税所得额200万元以下部分）');
    tips.push('注意：以上政策以当地税务机关最新公告为准');
    return tips;
  }

  // ===== 构建报告HTML =====
  var shop = esc(fd.shopName || d.store_name || '未命名店铺');
  var loc = esc(fd.location || '未填写');
  var dateStr = now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';

  var rpt = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>经营诊断报告 - '+shop+'</title>';
  rpt += '<style>';
  rpt += 'body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#333;max-width:800px;margin:0 auto;padding:40px 30px;line-height:1.8}';
  rpt += 'h1{font-size:24px;color:#1F4E79;text-align:center;margin-bottom:4px;padding-bottom:16px;border-bottom:3px solid #1F4E79}';
  rpt += '.sub{text-align:center;color:#888;font-size:13px;margin-bottom:30px}';
  rpt += 'h2{font-size:18px;color:#1F4E79;margin-top:28px;margin-bottom:12px;padding-left:10px;border-left:4px solid #1F4E79}';
  rpt += 'h3{font-size:15px;color:#555;margin-top:16px;margin-bottom:8px}';
  rpt += 'table{width:100%;border-collapse:collapse;margin:10px 0 16px}';
  rpt += 'th,td{padding:8px 10px;border:1px solid #e0e0e0;text-align:left;font-size:13px}';
  rpt += 'th{background:#f0f4f8;color:#1F4E79;font-weight:600}';
  rpt += '.score{display:inline-block;padding:2px 10px;border-radius:4px;font-weight:600;font-size:13px}';
  rpt += '.h{background:#e8f5e9;color:#2e7d32}';
  rpt += '.m{background:#fff8e1;color:#f57f17}';
  rpt += '.l{background:#ffebee;color:#c62828}';
  rpt += 'ul{padding-left:20px;margin:6px 0}';
  rpt += 'li{font-size:13px;margin:4px 0}';
  rpt += '.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0}';
  rpt += '.info-item{font-size:13px;padding:6px 10px;background:#f8f9fb;border-radius:4px}';
  rpt += '.info-item .label{color:#888}';
  rpt += '.warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:12px 16px;margin:12px 0;font-size:13px}';
  rpt += '.green-box{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:12px 16px;margin:12px 0;font-size:13px}';
  rpt += '.cta{background:#1F4E79;color:#fff;border-radius:8px;padding:16px 20px;margin:24px 0;text-align:center}';
  rpt += '.cta a{color:#FFD54F;font-weight:600;text-decoration:none}';
  rpt += '.page-break{page-break-before:always}';
  rpt += '@media print{body{padding:20px}}';
  rpt += '</style></head><body>';

  // 封面
  rpt += '<h1>实体店经营诊断报告</h1>';
  rpt += '<div class="sub">基于经营体检数据生成 · '+dateStr+' · 仅供经营参考</div>';

  // 基本信息摘要
  rpt += '<h2>一、基本信息</h2>';
  rpt += '<div class="info-grid">';
  var basics = [['店铺名称',shop],['所在区域',loc],['行业',esc((fd.industry_type||'')+(fd.industry_subtype?' / '+fd.industry_subtype:''))],['月营业额',esc(fd.monthly_revenue||'')],['月租金',esc(fd.rent||'')],['员工人数',esc(fd.employees||'')],['经营阶段',esc(fd.stage||'')],['近30天趋势',esc(fd.trend_30d||'')]];
  basics.forEach(function(b) { if (b[1]) rpt += '<div class="info-item"><span class="label">'+b[0]+'：</span>'+b[1]+'</div>'; });
  rpt += '</div>';

  // 经营健康度评分
  rpt += '<h2>二、经营健康度评分</h2>';
  rpt += '<p style="font-size:13px;color:#666">评分越高说明问题越严重（0-10分），建议优先处理分数最高的维度。</p>';
  rpt += '<table><tr><th>维度</th><th>评分</th><th>健康度</th></tr>';
  var dimLabels = {'客流':'🚶 客流','成交':'💰 成交','利润':'📊 利润','推广':'📢 推广','复购':'🔄 复购','管理':'👥 管理'};
  sortedDims.forEach(function(dim) {
    var s = scores[dim];
    var cls = s <= 3 ? 'h' : s <= 6 ? 'm' : 'l';
    var label = s <= 3 ? '良好' : s <= 6 ? '需关注' : '需改善';
    rpt += '<tr><td>'+(dimLabels[dim]||dim)+'</td><td><span class="score '+cls+'">'+s+' / 10</span></td><td>'+label+'</td></tr>';
  });
  rpt += '</table>';

  // 核心问题定位
  rpt += '<h2>三、核心问题定位</h2>';
  rpt += '<div class="warn-box">';
  rpt += '<strong>最需优先解决的维度：'+sortedDims[0]+'（评分 '+scores[sortedDims[0]]+'/10）</strong><br>';
  rpt += '分析：'+dimAnalysis(sortedDims[0]).analysis;
  if (sortedDims.length > 1) {
    rpt += '<br><br><strong>次优先维度：'+sortedDims[1]+'（评分 '+scores[sortedDims[1]]+'/10）</strong><br>';
    rpt += '分析：'+dimAnalysis(sortedDims[1]).analysis;
  }
  rpt += '</div>';

  // 各维度详细分析
  rpt += '<h2>四、各维度详细分析</h2>';
  sortedDims.forEach(function(dim) {
    var da = dimAnalysis(dim);
    rpt += '<h3>🚩 '+dim+'（评分 '+scores[dim]+'/10）</h3>';
    rpt += '<p style="font-size:13px">'+da.analysis+'</p>';
    rpt += '<ul>'+da.suggest.map(function(s) { return '<li>'+esc(s)+'</li>'; }).join('')+'</ul>';
  });

  // 行业专项
  rpt += '<h2>五、行业专项分析</h2>';
  rpt += '<ul>'+indNotes.map(function(n) { return '<li>'+esc(n)+'</li>'; }).join('')+'</ul>';
  var spKeys = Object.keys(sp);
  if (spKeys.length) {
    rpt += '<table><tr><th>行业问题</th><th>客户反馈</th></tr>';
    spKeys.forEach(function(k) { rpt += '<tr><td>'+esc(k)+'</td><td>'+esc(sp[k])+'</td></tr>'; });
    rpt += '</table>';
  }

  // 需求与预期
  var priorities = fd.priorities;
  rpt += '<h2>六、客户需求与期望</h2>';
  rpt += '<p style="font-size:13px">';
  if (priorities && priorities.length) rpt += '优先解决问题：'+esc(Array.isArray(priorities)?priorities.join('、'):priorities)+'<br>';
  if (fd.followup_need) rpt += '后续需求：'+esc(fd.followup_need)+'<br>';
  if (fd.profit_expectation) rpt += '期望利润提升：'+esc(fd.profit_expectation);
  rpt += '</p>';

  // 政策红利
  rpt += '<h2>七、政策红利提示</h2>';
  var policies = policyTips();
  rpt += '<ul>'+policies.map(function(p) { return '<li>'+esc(p)+'</li>'; }).join('')+'</ul>';

  // CTA
  rpt += '<div class="cta">';
  rpt += '<strong style="font-size:16px">需要更深入的经营诊断？</strong><br><br>';
  rpt += '线上分析只能基于填写信息做初步判断。<br>';
  rpt += '建议安排到店实地诊断，结合后台数据、现场观察、员工访谈，出具完整书面报告。<br><br>';
  rpt += '📞 联系顾问安排到店诊断';
  rpt += '</div>';

  rpt += '<p style="text-align:center;color:#999;font-size:12px;margin-top:40px">报告生成日期：'+dateStr+' · 本报告基于客户自填信息生成，仅供参考</p>';
  rpt += '</body></html>';

  // 在新窗口打开报告
  var w = window.open('', '_blank');
  if (!w) { alert('请允许弹出窗口'); return; }
  w.document.write(rpt);
  w.document.close();
  w.focus();
}
</script>
</body>
</html>
